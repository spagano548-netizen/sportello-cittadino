<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportello Cittadino</title>
    
    <!-- Qui inizia il "CSS", ovvero lo stile visivo della pagina -->
    <style>
        /* Regole per rendere tutto molto grande, chiaro e leggibile */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9; /* Sfondo grigio chiarissimo, riposante per gli occhi */
            color: #1a1a1a; /* Testo quasi nero, per un altissimo contrasto */
            margin: 0;
            padding: 0;
            font-size: 20px; /* Testo grande, ideale anche per gli anziani */
        }
        
        /* Stile della barra in alto (Intestazione) */
        header {
            background-color: #004080; /* Blu scuro istituzionale */
            color: #ffffff; /* Testo bianco per risaltare sul blu */
            padding: 20px;
            text-align: center;
        }
        
        /* Stile del contenuto centrale */
        main {
            padding: 20px;
            max-width: 800px; /* Non fa allargare troppo il testo sui PC */
            margin: 0 auto; /* Centra il contenuto nello schermo */
        }
        
        h1 {
            margin: 0;
            font-size: 32px; /* Titolo molto grande */
        }
    </style>
</head>
<body>

    <!-- Intestazione della pagina -->
    <header>
        <h1>Sportello Cittadino</h1>
        <p>Il tuo Comune a portata di click</p>
    </header>

    <!-- Contenuto centrale -->
    <main>
        <h2>Benvenuto!</h2>
        <p>Da questa pagina potrai inviare segnalazioni al Comune in modo semplice, sicuro e veloce.</p>
        
        <!-- Nota per noi: nel prossimo passaggio metteremo qui il modulo per le segnalazioni! -->
    </main>

</body>
</html>
