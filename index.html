<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportello Cittadino</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #1a1a1a;
            margin: 0;
            padding: 0;
            font-size: 22px; 
        }
        header { background-color: #004080; color: #ffffff; padding: 20px; text-align: center; }
        main { padding: 20px; max-width: 800px; margin: 0 auto; }
        .modulo-segnalazione { background-color: #ffffff; padding: 30px; border-radius: 10px; border: 2px solid #004080; }
        label { display: block; margin-top: 20px; font-weight: bold; }
        
        input, select, textarea {
            width: 100%; padding: 15px; margin-top: 10px; font-size: 20px; border: 2px solid #666; border-radius: 5px; box-sizing: border-box; 
        }

        .btn-azione {
            background-color: #0056b3; color: white; font-size: 20px; padding: 15px; border: none; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer;
        }

        .btn-invia {
            background-color: #28a745; color: white; font-size: 24px; font-weight: bold; padding: 20px; border: none; border-radius: 8px; width: 100%; margin-top: 30px; cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>Sportello Cittadino</h1>
        <p>Il tuo Comune a portata di click</p>
    </header>

    <main>
        <h2>Invia una nuova segnalazione</h2>
        
        <div class="modulo-segnalazione">
            <label for="categoria">1. Cosa vuoi segnalare?</label>
            <select id="categoria">
                <option value="Strade">Buca in strada o marciapiede rovinato</option>
                <option value="Rifiuti">Rifiuti abbandonati</option>
                <option value="Illuminazione">Lampione spento</option>
                <option value="Verde">Erba alta o alberi pericolanti</option>
                <option value="Altro">Altro problema</option>
            </select>

            <label for="descrizione">2. Descrivi il problema in breve:</label>
            <textarea id="descrizione" rows="4" placeholder="Scrivi qui..."></textarea>

            <label for="foto">3. Carica una foto (se ce l'hai):</label>
            <input type="file" id="foto" accept="image/*">

            <label>4. Posizione esatta (GPS):</label>
            <button type="button" class="btn-azione" onclick="trovaPosizione()">📍 Trova la mia posizione</button>
            <input type="text" id="risultato-gps" placeholder="Nessuna posizione rilevata" readonly>

            <label style="margin-top: 30px; background-color: #e9ecef; padding: 15px; border-radius: 5px;">
                <input type="checkbox" id="conto-terzi" style="width: 30px; height: 30px; vertical-align: middle; margin: 0 10px 0 0;">
                Sto inviando questa segnalazione per conto di una persona anziana o con disabilità.
            </label>

            <!-- Ho aggiunto 'onclick="salvaSegnalazione()"' per attivare il salvataggio! -->
            <button type="button" class="btn-invia" onclick="salvaSegnalazione()">Invia Segnalazione</button>
        </div>
    </main>

    <script>
        // Funzione per il GPS
        function trovaPosizione() {
            var casellaRisultato = document.getElementById("risultato-gps");
            casellaRisultato.value = "Ricerca in corso... attendi.";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(posizione) {
                        casellaRisultato.value = "Lat: " + posizione.coords.latitude + ", Lon: " + posizione.coords.longitude;
                    }, 
                    function(errore) {
                        casellaRisultato.value = "Permesso negato o posizione non trovata.";
                    }
                );
            } else {
                casellaRisultato.value = "Il tuo dispositivo non supporta il GPS.";
            }
        }

        // NUOVA FUNZIONE: Salva i dati e crea il ticket
        function salvaSegnalazione() {
            var categoria = document.getElementById("categoria").value;
            var descrizione = document.getElementById("descrizione").value;
            var gps = document.getElementById("risultato-gps").value;
            var contoTerzi = document.getElementById("conto-terzi").checked;
            
            // Controllo: assicuriamoci che l'utente abbia scritto qualcosa
            if (descrizione.trim() === "") {
                alert("Per favore, descrivi brevemente il problema prima di inviare.");
                return;
            }

            // Creiamo il "pacchetto" con tutte le informazioni del ticket
            var nuovoTicket = {
                id: Date.now(), // Crea un numero unico per la segnalazione
                data: new Date().toLocaleDateString("it-IT"), // Salva la data di oggi
                categoria: categoria,
                descrizione: descrizione,
                gps: gps,
                contoTerzi: contoTerzi,
                stato: "In attesa" // Impostiamo lo stato iniziale
            };

            // Apriamo il nostro database locale, aggiungiamo il ticket e richiudiamo
            var database = JSON.parse(localStorage.getItem("segnalazioniComune")) || [];
            database.push(nuovoTicket);
            localStorage.setItem("segnalazioniComune", JSON.stringify(database));

            // Avvisiamo il cittadino che è andato tutto a buon fine
            alert("✅ Segnalazione inviata con successo! Grazie per aver aiutato il tuo Comune.");
            
            // Svuotiamo il modulo per la prossima segnalazione
            document.getElementById("descrizione").value = "";
            document.getElementById("risultato-gps").value = "";
            document.getElementById("foto").value = "";
            document.getElementById("conto-terzi").checked = false;
        }
    </script>
</body>
</html>
