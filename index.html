<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportello Cittadino</title>
    
    <style>
        /* Stili di base ad alta leggibilità */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #1a1a1a;
            margin: 0;
            padding: 0;
            font-size: 22px; /* Testo ancora più grande e leggibile */
        }
        
        header {
            background-color: #004080;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }
        
        main {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        /* Stile per il riquadro del modulo (form) */
        .modulo-segnalazione {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px; /* Bordi arrotondati */
            border: 2px solid #004080; /* Bordo blu evidente per far capire dove ci si trova */
        }

        /* Etichette delle domande */
        label {
            display: block; 
            margin-top: 20px;
            font-weight: bold;
        }

        /* Campi di testo molto grandi e facili da toccare col dito sul telefono */
        input, select, textarea {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            font-size: 20px;
            border: 2px solid #666; /* Bordo scuro per alto contrasto */
            border-radius: 5px;
            box-sizing: border-box; 
        }

        /* Pulsante gigante e ben visibile */
        button {
            background-color: #007BFF;
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 20px;
            border: none;
            border-radius: 8px;
            width: 100%;
            margin-top: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>Sportello Cittadino</h1>
        <p>Il tuo Comune a portata di click</p>
    </header>

    <main>
        <h2>Invia una nuova segnalazione</h2>
        <p>Compila i campi qui sotto. Le scritte sono grandi per aiutarti a leggere meglio.</p>
        
        <div class="modulo-segnalazione">
            <label for="categoria">1. Cosa vuoi segnalare?</label>
            <select id="categoria">
                <option value="strade">Buca in strada o marciapiede rovinato</option>
                <option value="rifiuti">Rifiuti abbandonati</option>
                <option value="illuminazione">Lampione spento</option>
                <option value="verde">Erba alta o alberi pericolanti</option>
                <option value="altro">Altro problema</option>
            </select>

            <label for="descrizione">2. Descrivi il problema in breve:</label>
            <textarea id="descrizione" rows="4" placeholder="Scrivi qui..."></textarea>

            <label for="foto">3. Carica una foto (se ce l'hai):</label>
            <input type="file" id="foto" accept="image/*">

            <!-- Pulsante che per ora è solo grafico, lo faremo funzionare tra poco! -->
            <button type="button">Invia Segnalazione</button>
        </div>
    </main>

</body>
</html>
